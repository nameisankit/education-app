name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t education-app .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag image
        run: docker tag education-app ${{ secrets.DOCKER_USERNAME }}/education-app

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/education-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/education-app
            docker stop app || true
            docker rm app || true
            docker run -d -p 8501:8501 -e HF_TOKEN=${{ secrets.HF_TOKEN }} -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --restart always --name app ${{ secrets.DOCKER_USERNAME }}/education-app